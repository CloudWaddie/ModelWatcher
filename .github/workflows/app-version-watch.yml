name: App Version Watcher

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Java
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre

      - name: Download apkeep
        run: |
          curl -L -o apkeep https://github.com/EFForg/apkeep/releases/latest/download/apkeep-x86_64-unknown-linux-gnu
          chmod +x apkeep

      - name: Download apktool
        run: |
          curl -L -o apktool.jar https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar

      - name: List downloaded tools
        run: ls -la apkeep apktool.jar

      - name: Ensure logs folder exists
        run: mkdir -p logs

      - name: Run app version watch
        env:
          APP_WATCHER_WEBHOOK: ${{ secrets.APP_WATCHER_WEBHOOK }}
          AAS_TOKEN: ${{ secrets.AAS_TOKEN }}
          APK_EMAIL: ${{ secrets.APK_EMAIL }}
        run: npm run app-version

      - name: List logs
        if: always()
        run: ls -la logs/

      - name: Commit results to master
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "ModelWatcher"
          git config --global user.email "modelwatcher@github.com"

          cp logs/app-version-state.json /tmp/app-version-state-new.json 2>/dev/null || true
          cp -r strings /tmp/strings-new 2>/dev/null || true

          git fetch origin master
          git reset --hard origin/master

          mkdir -p logs strings
          if [ -f /tmp/app-version-state-new.json ]; then
            cp /tmp/app-version-state-new.json logs/app-version-state.json
          fi
          if [ -d /tmp/strings-new ]; then
            cp -r /tmp/strings-new/* strings/ 2>/dev/null || true
          fi

          STATE_CHANGED=false
          if [ -f logs/app-version-state.json ]; then
            ORIG_HASH=$(git show origin/master:logs/app-version-state.json 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "empty")
            NEW_HASH=$(sha256sum logs/app-version-state.json | cut -d' ' -f1)
            if [ "$ORIG_HASH" != "$NEW_HASH" ] || [ "$ORIG_HASH" = "empty" ]; then
              STATE_CHANGED=true
            fi
          fi

          STRINGS_CHANGED=false
          if [ -d strings ] && [ "$(ls -A strings)" ]; then
            git add -f strings/ || true
            if ! git diff --quiet --staged; then
              STRINGS_CHANGED=true
            fi
            git reset HEAD || true
          fi

          if [ "$STATE_CHANGED" = "false" ] && [ "$STRINGS_CHANGED" = "false" ]; then
            echo "No app version changes detected - skipping commit"
            exit 0
          fi

          git add -f logs/app-version-state.json strings/ || true
          if ! git diff --quiet --staged; then
            git commit -m "Update app version state - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin master
            echo "Updated app version state on master branch"
          else
            echo "No changes to commit"
          fi
